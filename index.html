<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Julia & Julius</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=WindSong:wght@400;500&display=swap" rel="stylesheet">

        <style>
            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fdfcfa;
                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
            }

            .staticrypt-page {
                text-align: center;
                padding: 2rem;
            }

            .staticrypt-names {
                font-family: 'WindSong', cursive;
                font-size: clamp(2.5rem, 7vw, 4rem);
                font-weight: 400;
                color: #3a3530;
                line-height: 1.2;
                margin-bottom: 0.3em;
            }

            .staticrypt-names .amp {
                display: block;
                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                font-size: 0.35em;
                font-weight: 300;
                color: #a08c6a;
                margin: 0.1em 0;
                letter-spacing: 0.1em;
            }

            .staticrypt-ornament {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
                margin: 1.5rem 0;
            }

            .staticrypt-ornament-line {
                width: 2rem;
                height: 0.5px;
                background: #c9bba0;
            }

            .staticrypt-ornament-diamond {
                width: 5px;
                height: 5px;
                border: 0.5px solid #a08c6a;
                transform: rotate(45deg);
            }

            .staticrypt-prompt {
                font-size: 0.75rem;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                color: #8a8279;
                margin-bottom: 1.5rem;
            }

            .staticrypt-form {
                max-width: 320px;
                margin: 0 auto;
            }

            .staticrypt-password-container {
                position: relative;
                margin-bottom: 1rem;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                padding: 0.7rem 2.5rem 0.7rem 1rem;
                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                font-size: 0.85rem;
                letter-spacing: 0.1em;
                color: #3a3530;
                background: transparent;
                border: 0.5px solid #e8e0d2;
                outline: none;
                text-align: center;
                box-sizing: border-box;
                transition: border-color 0.3s;
            }

            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                border-color: #c9bba0;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 16px;
                width: 16px;
                opacity: 0.4;
                padding: 0;
                position: absolute;
                right: 0.75rem;
                top: 50%;
                transform: translateY(-50%);
                transition: opacity 0.3s;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.7;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                font-size: 0.6rem;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                color: #a08c6a;
                background: transparent;
                border: 0.5px solid #c9bba0;
                padding: 0.65rem 2rem;
                cursor: pointer;
                transition: all 0.3s;
                width: 100%;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: #a08c6a;
                color: #fff;
                border-color: #a08c6a;
            }

            .staticrypt-error {
                font-size: 0.7rem;
                color: #c9bba0;
                margin-top: 0.75rem;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 1em;
                font-size: 0.65rem;
                letter-spacing: 0.15em;
                color: #8a8279;
            }

            .staticrypt-remember input[type="checkbox"] {
                margin-right: 0.5em;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fdfcfa;
            }

            .staticrypt-spinner {
                width: 1.5rem;
                height: 1.5rem;
                border: 1.5px solid #e8e0d2;
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

    <body class="staticrypt-body">

            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">
            <div class="staticrypt-page">
                <h1 class="staticrypt-names">
                    Julia
                    <span class="amp">&amp;</span>
                    Julius
                </h1>

                <div class="staticrypt-ornament">
                    <span class="staticrypt-ornament-line"></span>
                    <span class="staticrypt-ornament-diamond"></span>
                    <span class="staticrypt-ornament-line"></span>

                        <input type="submit" class="staticrypt-decrypt-button" value="Enter" />
                    </form>
                </div>
            </div>
